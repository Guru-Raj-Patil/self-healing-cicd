
services:
  jenkins:
    build:
      context: ./ci-cd
      dockerfile: Dockerfile
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ../self-healing-cicd:/workspace
    restart: unless-stopped
    # Optional: uncomment to skip wizard if plugins are installed via Dockerfile
    # environment:
    #   - JAVA_OPTS=-Djenkins.install.runSetupWizard=false

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ai-engine:/ai-engine
      - ./dashboard:/dashboard
      - ./fix-scripts:/fix-scripts
      - ../self-healing-cicd:/workspace
      - jenkins_home:/var/jenkins_home  # Allow backend to access Jenkins workspaces to apply fixes
    environment:
      - MONGO_URI=mongodb://mongodb:27017/cicd_healing
      - JENKINS_USER=admin
      - JENKINS_TOKEN=11299bbeabb81e9707cff0c84b6452425a
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  jenkins_home:
  mongo_data:
